# =============================================================================
# Render.com Blueprint — Family Feud
# =============================================================================
#
# IMPORTANT: Preview Environments are DISABLED to prevent cross-service
# deployment issues. We have two manually-created Render services:
#
#   1. PRODUCTION (v1) → pubfeud.gamenightguild.net    (deploys from: v1 branch)
#   2. DEV (v2)        → ff-v2-dev.gamenightguild.net  (deploys from: main branch)
#
# To test major changes safely:
#   1. Create a feature branch off main
#   2. Open a PR to main — test at ff-v2-dev.gamenightguild.net after merge
#   3. Production (v1) is untouched since it deploys from the v1 branch only
#
# DO NOT enable preview environments — it triggers deploys on BOTH services.
# =============================================================================

previews:
  generation: "off"

services:
  - type: web
    name: family-feud
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      # HOST_PASSWORD is set in Render dashboard (not in code)
      - key: RENDER
        value: "true"
