services:
  - type: web
    name: family-feud
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: HOST_PIN
        value: "6551"
      - key: RENDER
        value: "true"
