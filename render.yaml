# =============================================================================
# Render.com Blueprint — Survey Says
# =============================================================================
#
# Services:
#   1. PRODUCTION (v1) → pubfeud.gamenightguild.net    (deploys from: v1 branch)
#   2. DEV (v2)        → ff-v2-dev.gamenightguild.net  (deploys from: main branch)
#
# Preview Environments (Review Apps):
#   - Enabled: each PR automatically gets a temporary preview instance
#   - Preview URL: auto-assigned by Render (e.g., family-feud-pr-N.onrender.com)
#   - QR codes on previews use the preview's own URL (not production)
#   - Previews auto-expire after 3 days of inactivity
#   - Production and Dev services are NOT affected by previews
#
# =============================================================================

previews:
  generation: automatic
  expireAfterDays: 3

services:
  - type: web
    name: family-feud
    runtime: python
    plan: free
    previewPlan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker --workers 1 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      # HOST_PASSWORD is set in Render dashboard (not in code)
      - key: RENDER
        value: "true"
      - key: IS_PREVIEW
        value: "false"
        previewValue: "true"
      - key: QR_BASE_URL
        value: ""
        previewValue: ""
