<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Login - Family Feud</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}?v={{ cache_bust }}">
    <style>
        :root {
            --font: {{ theme.font_family }};
            --bg-gradient: {{ theme.bg_gradient }};
            --bg-color: {{ theme.bg_color }};
            --accent: {{ theme.accent }};
            --card-border: {{ theme.card_border }};
            --active-bg: {{ theme.active_bg }};
            --active-border: {{ theme.active_border }};
            --text: {{ theme.text_primary }};
            --text-accent: {{ theme.text_accent }};
            --text-muted: {{ theme.text_muted }};
            --success: {{ theme.success }};
            --success-text: {{ theme.success_text }};
            --btn-bg: {{ theme.btn_bg }};
            --btn-text: {{ theme.btn_text }};
            --btn-blue-bg: {{ theme.btn_blue_bg }};
            --btn-blue-text: {{ theme.btn_blue_text }};
            --score-first-bg: {{ theme.score_first_bg }};
            --score-first-text: {{ theme.score_first_text }};
            --code-border: {{ theme.code_border }};
        }
        {% if theme.font_url %}
        @import url('{{ theme.font_url }}');
        {% endif %}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font);
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: var(--bg-color);
            border: 4px solid var(--accent);
            border-radius: 15px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-title {
            color: var(--text-accent);
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .logo img {
            width: 250px;
            height: auto;
        }

        .presented-by {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.75em;
            margin-bottom: 8px;
            opacity: 0.8;
            text-transform: lowercase;
        }
        
        h1 {
            color: var(--text-accent);
            text-align: center;
            margin: 20px 0 10px 0;
            font-size: 1.8em;
            text-transform: uppercase;
        }
        
        .subtitle {
            color: var(--text);
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            color: var(--text-accent);
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 2px solid var(--accent);
            background: color-mix(in srgb, var(--text) 10%, transparent);
            color: var(--text);
            border-radius: 8px;
            font-family: monospace;
        }

        input[type="password"]:focus {
            outline: none;
            background: color-mix(in srgb, var(--text) 15%, transparent);
            border-color: var(--card-border);
        }
        
        button {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            font-weight: bold;
            background: var(--success);
            color: var(--success-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--success);
            filter: brightness(0.85);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px color-mix(in srgb, var(--success) 50%, transparent);
        }
        
        .error {
            background: rgba(220,53,69,0.2);
            border: 2px solid #dc3545;
            color: var(--text);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-title">Family Feud</div>
        <p class="presented-by">presented by</p>

        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}?v={{ cache_bust }}" alt="Game Night Guild">
        </div>
        
        <h1>Host Login</h1>
        <p class="subtitle">Enter password to access host dashboard</p>
        
        {% if error %}
        <div class="error">
            ❌ Incorrect password - Try again
        </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="password">Host Password:</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Enter password"
                       autofocus
                       required>
            </div>
            
            <button type="submit">🔓 Unlock Host Panel</button>
        </form>
    </div>
    
    <script>
        // Auto-focus on password input
        document.getElementById('password').focus();
    </script>
</body>
</html>
